<script type="text/javascript">
  RED.nodes.registerType("proxlab-subscribe", {
    category: "ProxLab",
    color: "#7c3aed",
    defaults: {
      name: { value: "" },
      server: { value: "", type: "proxlab-server", required: true },
      action: { value: "list" },
    },
    inputs: 1,
    outputs: 1,
    icon: "font-awesome/fa-bell",
    label: function () {
      return this.name || "proxlab subscribe";
    },
    paletteLabel: "proxlab subscribe",
  });
</script>

<script type="text/html" data-template-name="proxlab-subscribe">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="Name" />
  </div>
  <div class="form-row">
    <label for="node-input-server"
      ><i class="fa fa-server"></i> Server</label
    >
    <input type="text" id="node-input-server" />
  </div>
  <div class="form-row">
    <label for="node-input-action"
      ><i class="fa fa-cog"></i> Action</label
    >
    <select id="node-input-action">
      <option value="list">List</option>
      <option value="create">Create</option>
      <option value="update">Update</option>
      <option value="delete">Delete</option>
    </select>
  </div>
</script>

<script type="text/html" data-help-name="proxlab-subscribe">
  <p>
    Manages ProxLab event subscriptions on Home Assistant. Subscriptions
    automatically invoke an agent when a specified HA event fires.
  </p>

  <h3>Actions</h3>
  <dl class="message-properties">
    <dt>list</dt>
    <dd>Returns all subscriptions. No input required.</dd>
    <dt>create</dt>
    <dd>
      Creates a subscription. <code>msg.payload</code> must include
      <code>event_type</code> and <code>agent_id</code>. Optional:
      <code>event_filter</code>, <code>message_template</code>,
      <code>cooldown_seconds</code>, <code>enabled</code>.
    </dd>
    <dt>update</dt>
    <dd>
      Updates a subscription. <code>msg.payload.subscription_id</code> required.
      Include any fields to change.
    </dd>
    <dt>delete</dt>
    <dd>
      Deletes a subscription. Pass <code>subscription_id</code> in
      <code>msg.payload</code> or as a string.
    </dd>
  </dl>

  <h3>Inputs</h3>
  <dl class="message-properties">
    <dt class="optional">action <span class="property-type">string</span></dt>
    <dd>Override the configured action.</dd>
    <dt>payload <span class="property-type">object | string</span></dt>
    <dd>Subscription data for create/update, or subscription_id for delete.</dd>
  </dl>

  <h3>Outputs</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">array | object</span></dt>
    <dd>Result from Home Assistant (list of subscriptions, or single result).</dd>
  </dl>
</script>
